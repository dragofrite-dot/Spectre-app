<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPECTRE. · L'actualité tous horizons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;1,8..60,400&display=swap" rel="stylesheet">
<style>


*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Source Sans 3',sans-serif;transition:background .2s,color .2s;}
body.light{background:#F5F2EB;color:#18181B;}
body.dark{background:#111113;color:#FAFAFA;}
input{font-family:'Source Sans 3',sans-serif;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes toast{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.fade-up{animation:fadeUp .3s ease both;}
.card{transition:transform .18s ease,box-shadow .18s ease;cursor:pointer;}
.card:hover{transform:translateY(-2px);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(128,128,128,.2);border-radius:4px;}


</style>
